<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" role="img" aria-labelledby="title desc">
  <title id="title">GADGETS MELA</title>
  <desc id="desc">Gadgets Mela wordmark inspired by the supplied magenta stencil logo.</desc>
  <defs>
    <linearGradient id="gm-magenta" x1="40" x2="600" y1="56" y2="138" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff6f9d"/>
      <stop offset="0.48" stop-color="#b11f55"/>
      <stop offset="1" stop-color="#f05b88"/>
    </linearGradient>
    <filter id="word-shadow" x="-8%" y="-28%" width="116%" height="156%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="3" stdDeviation="1.1" flood-color="#000000" flood-opacity="0.65"/>
    </filter>
    <pattern id="stencil-cuts" width="54" height="36" patternUnits="userSpaceOnUse" patternTransform="rotate(-10)">
      <rect width="54" height="36" fill="transparent"/>
      <rect x="4" y="13" width="19" height="8" rx="1" fill="#0b0b0d" opacity="0.72"/>
      <rect x="33" y="6" width="16" height="7" rx="1" fill="#0b0b0d" opacity="0.6"/>
    </pattern>
  </defs>
  <rect width="640" height="200" fill="#000000"/>
  <g filter="url(#word-shadow)">
    <text x="320" y="112" text-anchor="middle" dominant-baseline="middle" fill="url(#gm-magenta)" stroke="#f8d7e1" stroke-width="2.2" paint-order="stroke fill" font-family="Impact, Haettenschweiler, 'Arial Black', sans-serif" font-size="52" font-weight="900" letter-spacing="8">GADGETS MELA</text>
    <text x="320" y="112" text-anchor="middle" dominant-baseline="middle" fill="url(#stencil-cuts)" font-family="Impact, Haettenschweiler, 'Arial Black', sans-serif" font-size="52" font-weight="900" letter-spacing="8">GADGETS MELA</text>
  </g>
</svg>
